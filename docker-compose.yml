# Command Center on the existing Docker + Traefik VPS (mirrors the mirofish setup).
#  - app:    Next.js web server, routed by Traefik (auto HTTPS via letsencrypt).
#  - worker: the autonomy scheduler (15-min cycle + 7:30 briefing). No host cron.
# Both share a named volume so the SQLite DB + Google tokens persist across rebuilds.
#
# Configure via .env in this folder (compose reads it automatically):
#   CC_DOMAIN=command.yourdomain.com        # the subdomain Traefik will serve
#   TRAEFIK_NETWORK=<your Traefik network>   # from: docker network ls  (matches mirofish)
#   + all the app secrets (ANTHROPIC_API_KEY, GOOGLE_*, OFFLOAD_*, etc.)

services:
  app:
    build: .
    image: command-center
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=America/New_York
    volumes:
      - command_data:/app/data
    command: sh -c "npm run db:init && npm run migrate && npm start"
    networks:
      - traefik
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.commandcenter.rule=Host(`${CC_DOMAIN}`)"
      - "traefik.http.routers.commandcenter.entrypoints=websecure"
      - "traefik.http.routers.commandcenter.tls.certresolver=letsencrypt"
      - "traefik.http.services.commandcenter.loadbalancer.server.port=3000"

  worker:
    image: command-center
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=America/New_York
    volumes:
      - command_data:/app/data
    command: sh -c "sleep 12 && node scripts/scheduler.js"
    depends_on:
      - app

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}

volumes:
  command_data:
