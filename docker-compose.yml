# Command Center on the VPS (self-contained — does NOT touch mirofish/Traefik).
#  - caddy:  HTTPS reverse proxy. Auto-issues a Let's Encrypt cert for CC_DOMAIN
#            and proxies to the app. Owns ports 80/443 (free on this box).
#  - app:    Next.js web server (internal :3000, only reachable via caddy).
#  - worker: the autonomy scheduler (15-min cycle + 7:30 briefing). No host cron.
# Persistent data lives in named volumes (DB + Google tokens + TLS certs).
#
# Configure via .env in this folder (compose + caddy read it):
#   CC_DOMAIN=command.yourdomain.com   + all app secrets (ANTHROPIC_API_KEY, GOOGLE_*, OFFLOAD_*)
# DNS: point CC_DOMAIN's A record at this server BEFORE `docker compose up`.

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  app:
    build: .
    image: command-center
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=America/New_York
    volumes:
      - command_data:/app/data
    command: sh -c "npm run db:init && npm run migrate && npm start"

  worker:
    image: command-center
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=America/New_York
    volumes:
      - command_data:/app/data
    command: sh -c "sleep 12 && node scripts/scheduler.js"
    depends_on:
      - app

volumes:
  command_data:
  caddy_data:
  caddy_config:
